name: CI Pipeline

on:
  push:
    branches:
      - tasks/USR-0
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-analyze:
    name: Build, Test, SonarCloud & Docker
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up JDK 17 for Maven
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      # 3. Cache SonarCloud packages
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # 4. Cache Maven packages
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # 5. Build & Test userService
      - name: Build and Run Tests
        run: mvn -B clean verify -pl userService

      # 6. SonarCloud Analysis for userService
      - name: SonarCloud Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
          -Dsonar.projectKey=GDayan_inno-microservice \
          -Dsonar.organization=gdayan \
          -Dsonar.host.url=https://sonarcloud.io \
          -pl userService
        working-directory: ./userService

      # 7. Build Docker image for userService
      - name: Build Docker Image
        run: docker build -t userService:latest ./userService

      # 8. Docker Hub Login
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 9. Push Docker Image
      - name: Push Docker Image
        run: |
          docker tag userService:latest dayan78/userservice:${GITHUB_SHA::8}
          docker push dayan78/userservice:${GITHUB_SHA::8}